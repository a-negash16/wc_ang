name: Refresh World Cup Data

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh World Cup data from FIFA
        shell: bash
        run: node scripts/refresh-wc-data.mjs

      - name: Commit refreshed data
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/wc2026/data/*.json; then
            echo "No World Cup data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/wc2026/data/*.json
          git commit -m "Refresh World Cup data"
          git push
